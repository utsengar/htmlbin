name = "htmlbin"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "8a9eb8a6efdca98aa450343a55b484cc"

# Each `wrangler versions upload` returns a workers.dev preview URL we
# can post on PRs. Production traffic still goes through the custom
# domain routes below — preview URLs are isolated workers.dev addresses.
preview_urls = true

# Bind the worker to your custom domain. The DNS for htmlbin.dev is
# already configured under your Cloudflare account; this tells Workers
# to attach itself.
routes = [
  { pattern = "htmlbin.dev", custom_domain = true },
  { pattern = "www.htmlbin.dev", custom_domain = true }
]

[observability]
enabled = true

# Production values. Local dev overrides via .dev.vars, so you don't
# have to maintain two environments.
[vars]
PUBLIC_URL = "https://htmlbin.dev"
# GitHub OAuth app client id (public). Replace with the value from
# github.com/settings/applications/new (Authorization callback URL =
# https://htmlbin.dev/auth/github/callback).
GITHUB_CLIENT_ID = "REPLACE_WITH_PROD_GH_CLIENT_ID"

# Secrets (set with `wrangler secret put NAME`):
#   GITHUB_CLIENT_SECRET  → GitHub OAuth app client secret
#   TOKEN_PEPPER          → random 32+ char string used to hash API tokens

[[kv_namespaces]]
binding = "DROPS_KV"
id = "915440d1cdfb4876bb3b8c721a694873"

[[d1_databases]]
binding = "DB"
database_name = "htmlbin-db"
database_id = "63632af3-b786-422b-87bd-bf6e13399ec9"

# Workers AI — used for HTML → Markdown conversion via env.AI.toMarkdown()
# https://blog.cloudflare.com/markdown-for-agents/
[ai]
binding = "AI"

# Satori + resvg-wasm: dynamic PNG OG image rendering. The wasm import
# from @resvg/resvg-wasm is a binary asset; CompiledWasm tells wrangler
# to ship it as a WebAssembly.Module ready for instantiation.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Self-hosted Geist + Geist Mono fonts.
#
# We don't import the woff2 files directly — wrangler 4 + ES module Workers
# does not reliably honor [[rules]] type="Data" for imports outside src/.
# Instead, the woff2 bytes are base64-inlined into src/fonts-data.ts by
# scripts/build-fonts.mjs (regenerate after dropping new files into
# assets/fonts/). src/fonts.ts decodes once at cold start.

